
<style>
/*body{*/
/*cursor:none;*/
/*}*/
.cursor-dot{
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    background: #2C2CF3;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%);
    will-change: transform;
}
.cursor-trail{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:9998;
}
    .img_galary_1{ 
        height:500px; 
        overflow:hidden; 
        position:relative; 
    } 

    .img_galary_1 img{ 
        width:100%; 
        display:block; 
        }
</style>

<script>

const gallery = document.querySelector('.img_galary_1');

let speed = 0.5;
let scrollPos = 0;

gallery.innerHTML += gallery.innerHTML; // duplicate images for infinite loop

function smoothScroll(){

    scrollPos += speed;
    gallery.scrollTop = scrollPos;

    if(scrollPos >= gallery.scrollHeight / 2){
        scrollPos = 0;
    }

    requestAnimationFrame(smoothScroll);
}

smoothScroll();

gallery.addEventListener('wheel', function(e){

    e.preventDefault();

    scrollPos += e.deltaY * 0.5;
    gallery.scrollTop = scrollPos;

});

const dot = document.querySelector(".cursor-dot");
const canvas = document.querySelector(".cursor-trail");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let mouse = {x:0,y:0};
let trail = [];

document.addEventListener("mousemove", (e)=>{

    mouse.x = e.clientX;
    mouse.y = e.clientY;

    dot.style.transform =
        `translate(${mouse.x}px,${mouse.y}px) translate(-50%,-50%)`;

    trail.push({x:mouse.x,y:mouse.y});

    if(trail.length > 20){
        trail.shift();
    }

});

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.beginPath();

    for(let i=0;i<trail.length;i++){

        let p = trail[i];

        if(i===0){
            ctx.moveTo(p.x,p.y);
        }else{
            ctx.lineTo(p.x,p.y);
        }

    }

    ctx.strokeStyle = "#cad1d5";
    ctx.lineWidth = 2;
    ctx.stroke();

    requestAnimationFrame(animate);
}

animate();
</script>
