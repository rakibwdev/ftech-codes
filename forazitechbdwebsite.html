
<style>
/*body{*/
/*cursor:none;*/
/*}*/
.cursor-dot{
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    background: #2C2CF3;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    will-change: transform;
}
.cursor-trail{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:9998;
    background:transparent
}

.img_galary_1,
.img_galary_2,
.img_galary_3{
    height:800px;
    overflow:hidden;
    position:relative;
}

.gallery-inner{
    will-change: transform;
}

.img_galary_1 img,
.img_galary_2 img,
.img_galary_3 img{
    width:100%;
    display:block;
}
</style>

<script>

function createSmoothGallery(selector, direction = 1){

    const gallery = document.querySelector(selector);
    if(!gallery) return;

    // duplicate content
    gallery.innerHTML += gallery.innerHTML;

    let autoSpeed = 0.5 * direction;
    let wheelForce = 0;

    // start from middle for perfect looping
    let scrollPos = gallery.scrollHeight / 2;
    gallery.scrollTop = scrollPos;

    function animate(){

        scrollPos += autoSpeed;
        scrollPos += wheelForce;

        wheelForce *= 0.9;

        gallery.scrollTop = scrollPos;

        const limit = gallery.scrollHeight / 2;

        if(scrollPos >= limit){
            scrollPos -= limit;
            gallery.scrollTop = scrollPos;
        }

        if(scrollPos <= 0){
            scrollPos += limit;
            gallery.scrollTop = scrollPos;
        }

        requestAnimationFrame(animate);
    }

    animate();

    gallery.addEventListener("wheel",(e)=>{

        e.preventDefault();
        wheelForce += e.deltaY * 0.05;

    },{passive:false});
}


// directions
createSmoothGallery('.img_galary_1', 1);   // down
createSmoothGallery('.img_galary_2', -1);  // up
createSmoothGallery('.img_galary_3', 1);   // down



// =============================
// Cursor Trail
// =============================

const dot = document.querySelector(".cursor-dot");
const canvas = document.querySelector(".cursor-trail");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let mouseX = 0;
let mouseY = 0;

let lastX = 0;
let lastY = 0;

document.addEventListener("mousemove",(e)=>{

    mouseX = e.clientX;
    mouseY = e.clientY;

    dot.style.transform =
        `translate(${mouseX}px, ${mouseY}px) translate(-50%,-50%)`;

});

function animate(){

    ctx.globalCompositeOperation = "destination-out";
    ctx.fillStyle = "rgba(0,0,0,0.30)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.globalCompositeOperation = "source-over";

    const dx = mouseX - lastX;
    const dy = mouseY - lastY;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if(dist > 0.5){

        ctx.beginPath();
        ctx.moveTo(lastX,lastY);
        ctx.lineTo(mouseX,mouseY);

        ctx.strokeStyle = "#cad1d5";
        ctx.lineWidth = 2;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        ctx.stroke();

        lastX = mouseX;
        lastY = mouseY;
    }

    requestAnimationFrame(animate);
}

animate();
</script>
