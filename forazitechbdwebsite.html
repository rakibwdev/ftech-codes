
<style>
/*body{*/
/*cursor:none;*/
/*}*/
.cursor-dot{
    position: fixed;
    top: 0;
    left: 0;
    width: 12px;
    height: 12px;
    background: #D8FF85;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999999;
    transform: translate(-50%, -50%);
    will-change: transform;
}

    .img_galary_1{ 
        height:500px; 
        overflow:hidden; 
        position:relative; 
    } 

    .img_galary_1 img{ 
        width:100%; 
        display:block; 
        }
</style>

<script>

const gallery = document.querySelector('.img_galary_1');

let speed = 0.5;
let scrollPos = 0;

gallery.innerHTML += gallery.innerHTML; // duplicate images for infinite loop

function smoothScroll(){

    scrollPos += speed;
    gallery.scrollTop = scrollPos;

    if(scrollPos >= gallery.scrollHeight / 2){
        scrollPos = 0;
    }

    requestAnimationFrame(smoothScroll);
}

smoothScroll();

gallery.addEventListener('wheel', function(e){

    e.preventDefault();

    scrollPos += e.deltaY * 0.5;
    gallery.scrollTop = scrollPos;

});


// mouse pointer
const cursor = document.querySelector('.cursor-dot');

let mouseX = 0;
let mouseY = 0;

let posX = 0;
let posY = 0;

document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

function animate(){

    posX += (mouseX - posX) * 0.15;
    posY += (mouseY - posY) * 0.15;

    cursor.style.transform =
        `translate(${posX}px, ${posY}px) translate(-50%, -50%)`;
// cursor.style.transform =
//         `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;

    requestAnimationFrame(animate);
}

animate();

</script>
