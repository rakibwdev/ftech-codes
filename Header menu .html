<script>
document.addEventListener('DOMContentLoaded', function () {

    const menuItems = document.querySelectorAll('.mega_menu_popup');
    const megaPopups = document.querySelectorAll('.mega_popup');
    const menuPopup = document.querySelector('.menu_popup');
    const menuOpenIcon = document.querySelector('.menu_open_icon');
    const menuCloseIcon = document.querySelector('.menu_close_icon');
    const menuWraper = menuPopup.querySelector('.menu_wraper');
    const customMenus = document.querySelector('.custom_menu');
    const megaPopup = document.querySelectorAll('.mega_popup');

    if (!menuItems.length) {
        console.log('mega_menu_popup not found');
        return;
    }

    menuItems.forEach((item, i) => {

        const link = item.querySelector('a');

        if (!link) {
            console.log('No <a> inside menu item');
            return;
        }

        link.addEventListener('click', function (e) {
            if (window.innerWidth <= 1023) {
                const submenu = item.querySelector('.sub-menu, .elementor-sub-menu');
                if (submenu) {
                    e.preventDefault();
                    e.stopPropagation();
                    const isOpen = submenu.classList.toggle('open');
                    submenu.style.display = isOpen ? 'block' : 'none';
                    return;
                }
            }

            e.preventDefault();
            e.stopImmediatePropagation();

            console.log('CLICK WORKING:', i);

            const isActive = item.classList.contains('active');

            // CLOSE ALL
            menuItems.forEach(m => m.classList.remove('active'));
            megaPopups.forEach(p => p.style.display = 'none');

            if (!isActive) {
                item.classList.add('active');

                if (megaPopups[i]) {
                    megaPopups[i].style.display = 'block';
                    // megaPopups[i].style.left = `${item.getBoundingClientRect().left}px`;
                }

                if (menuPopup) {
                    menuPopup.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                }

            } else {
                if (menuPopup) {
                    menuPopup.style.display = 'none';
                    document.body.style.overflow = '';
                }
            }

        });

    });
    
    document.querySelectorAll('.custom_menu .menu-item-has-children > a').forEach(link => {

    link.addEventListener('click', function (e) {
        e.preventDefault();
        e.stopPropagation();

        const submenu = this.nextElementSibling;

        if (!submenu) return;

        // CLOSE MEGA POPUP
        document.querySelectorAll('.mega_popup').forEach(p => p.style.display = 'none');
        document.querySelector('.menu_popup').style.display = 'none';
        document.querySelectorAll('.mega_menu_popup').forEach(m => m.classList.remove('active'));

        // CLOSE OTHER SUBMENUS
        document.querySelectorAll('.custom_menu .sub-menu').forEach(menu => {
            if (menu !== submenu) {
                menu.classList.remove('open');
            }
        });

        // TOGGLE CURRENT
        submenu.classList.toggle('open');
    });

});


// menu toggole funtion


menuOpenIcon.addEventListener('click', () => {
    menuOpenIcon.style.display = 'none';
    menuCloseIcon.style.display = 'block';
    menuWraper.style.display = 'block';
    megaPopup.forEach((popup) => {
        popup.style.display = 'none';
    });
    openMenu();
});

menuCloseIcon.addEventListener('click', () => {
    menuOpenIcon.style.display = 'block';
    menuCloseIcon.style.display = 'none';
    menuWraper.style.display = 'none';
    closeMenu();
});

// open menu popup  
function openMenu() {
    menuPopup.style.display = 'flex';
    document.body.style.overflow = 'hidden'; // Disable scroll
}

// Close menu function
function closeMenu() {
    menuPopup.style.display = 'none';
    document.body.style.overflow = ''; // Re-enable scroll
}



// Close menu when clicking outside
document.addEventListener('click', (e) => {
    const isClickInsideMenu = menuWraper.contains(e.target);
    const isClickOnIcons = menuOpenIcon.contains(e.target) || menuCloseIcon.contains(e.target);
    const isClickCustomMenus = customMenus.contains(e.target);
    const isClickMegaPopup = Array.from(megaPopup).some(popup => popup.contains(e.target));

    if (!isClickInsideMenu && !isClickOnIcons && !isClickCustomMenus && !isClickMegaPopup) {
        menuOpenIcon.style.display = 'block';
        menuCloseIcon.style.display = 'none';
        megaPopup.forEach((popup) => {
            popup.style.display = 'none';
        });
        menuItems.forEach((menu) => {
            menu.classList.remove('active');
        });
        closeMenu();

    }
});

    const menuList = document.querySelectorAll('.attribute_menu a');

menuList.forEach((item) => {
    const title = item.getAttribute('title')?.split('|');
    if (title && title[1]) { // make sure there is a second part
        item.setAttribute('data-click-id', title[1].trim());
        item.removeAttribute('title'); // remove the title
    }
});

});
</script>
