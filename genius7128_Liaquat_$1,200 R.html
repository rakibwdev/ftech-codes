<style>
    .mob-men, .dex_header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    transition: transform 0.3s ease;
}
</style>

<script>

    let lastScrollTop = 0;

const header = document.querySelector('.dex_header');
const mobHeader = document.querySelector('.mob-men');

window.addEventListener('scroll', function () {

    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

    if (scrollTop > lastScrollTop) {

        if(header){
            header.style.transform = "translateY(-100%)";
            headerstyle.backgroundColor = "#00000070";

        }

        if(mobHeader){
            mobHeader.style.transform = "translateY(-100%)";
            mobHeader.style.backgroundColor = "#00000070";


        }

    } else {

        if(header){
            header.style.transform = "translateY(0)";
            header.style.backgroundColor = "#00000070";
        }

        if(mobHeader){
            mobHeader.style.transform = "translateY(0)";
            mobHeader.style.backgroundColor = "#00000070";
        }

    }

    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;

});
</script>

<style>

/* hide all by default */
.tec_spec .spec_Des {
    opacity: 0 !important;
    position: absolute !important;
    visibility: hidden !important;
    transition: opacity 0.6s ease, visibility 0.6s linear 0.6s;
}

/* show active only */
.tec_spec .spec_Des.active {
    position: relative !important;
    opacity: 1 !important;
    visibility: visible !important;
}

.pop_button{
    overflow:hidden;
    border-radius: 12px;
}
.main_img img {
    aspect-ratio: 650 /390;
    object-fit: cover;
        border-radius: 12px;
}

.tec_spec .main_img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity:0;
    transform: translateX(110%) scale(1.4);
    transition: opacity 0.1s ease-out,transform 0.1s ease-out;
    transition-delay: 0.9s;
    z-index: 0;
}

/* show active only */
.tec_spec .main_img.active {
    position: relative;
    transform: translateX(0%) scale(1.1);
    transition: transform 0.8s cubic-bezier(0.22, 0.53, 1, 1);
    z-index: 1;
    opacity:1;
}


/* thumbnails */
.tec_spec .side_img img{
    width: 100%;
    height: 100%;
    cursor: pointer;
    /*opacity: 0.6;*/
    transition: 0.3s;        
    aspect-ratio: 96/80;
    object-fit: cover;
    z-index: 9;
}

/* active thumbnail */

.tec_spec .side_img {
    opacity: 0.6;
}
.tec_spec .side_img.active {
    opacity: 1;
}


  button.pop_button:hover,
button.pop_button:focus {
    background-color: transparent;
    color: inherit;
    text-decoration: none;
}

.btn_brc {
    position: relative;
    overflow: hidden;
    display: inline-block;
    z-index: 1;
    transition: color 0.3s ease;
}

/* pseudo background */
.btn_brc::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 0%;
    background-color: black;
    z-index: -1;
    transition: height 0.4s ease;
}

/* hover effect */
.btn_brc:hover::after {
    height: 100%;
}

.btn_spec {
    position: relative;
    overflow: hidden;
    display: inline-block;
    z-index: 1;
    transition: color 0.3s ease;
}

/* pseudo background */
.btn_spec::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 0%;
    background-color: #CF201A;
    z-index: -1;
    transition: height 0.4s ease;
}

/* hover effect */
.btn_spec:hover::after {
    height: 100%;
}


</style>



<script>
document.addEventListener("DOMContentLoaded", function(){

    document.querySelectorAll('.tec_spec').forEach(container => {

        const sideImgs = container.querySelectorAll('.side_img');
        const mainImgs = container.querySelectorAll('.main_img');
        const specDes  = container.querySelectorAll('.spec_Des');
        const nextBtn = container.querySelector('#next');
        const prevBtn = container.querySelector('#prev');



        let currentIndex = 0;

        function setActive(index){

            // fix index bounds
            if(index < 0) index = sideImgs.length - 1;
            if(index >= sideImgs.length) index = 0;

            currentIndex = index;

            // remove all active
            sideImgs.forEach(el => el.classList.remove('active'));
            mainImgs.forEach(el => el.classList.remove('active'));
            specDes.forEach(el => el.classList.remove('active'));

            // add active
            sideImgs[index]?.classList.add('active');
            mainImgs[index]?.classList.add('active');
            specDes[index]?.classList.add('active');
        }

        // default
        setActive(0);

        // thumbnails click
        sideImgs.forEach(function(img, index){
            img.addEventListener('click', function(){
                setActive(index);
            });
        });

        // buttons click
        if(nextBtn){
            nextBtn.addEventListener('click', function(){
                setActive(currentIndex + 1);
            });
        }

        if(prevBtn){
            prevBtn.addEventListener('click', function(){
                setActive(currentIndex - 1);
            });
        }

    });

});
</script>

/*card*/
.card_wrapper {
    overflow: hidden;
    cursor: grab;
}

.card_wrapper:active {
    cursor: grabbing;
}

.card_track {
    display: flex;
    flex-direction: column;
    gap: 20px;
    transition: transform 0.2s ease;
    will-change: transform;
}

.card {
    aspect-ratio: 517/7444 ;
    max-width: 517px;
    max-height: 744px;

<script>
window.addEventListener("scroll", function() {
    const section = document.querySelector(".bg_img");
    if (!section) return;

    const rect = section.getBoundingClientRect();
    const speed = 0.2; // control speed
    const offset = rect.top * speed;

    section.style.setProperty('--parallaxY', offset + 'px');
});

// drag slider

const track = document.querySelector('.card_track');
const wrapper = document.querySelector('.card_wrapper');

let isDragging = false;
let startX = 0;
let currentX = 0;
let translateX = 0;

wrapper.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.pageX - translateX;
    wrapper.style.cursor = 'grabbing';
    track.style.transition = 'none';
});

wrapper.addEventListener('mousemove', (e) => {
    if (!isDragging) return;

    currentX = e.pageX;
    translateX = currentX - startX;

    track.style.transform = `translateX(${translateX}px)`;
});

wrapper.addEventListener('mouseup', () => {
    isDragging = false;
    wrapper.style.cursor = 'grab';
    track.style.transition = 'transform 0.3s ease';
});

wrapper.addEventListener('mouseleave', () => {
    isDragging = false;
    wrapper.style.cursor = 'grab';
});

// mobile
wrapper.addEventListener('touchstart', (e) => {
    isDragging = true;
    startX = e.touches[0].clientX - translateX;
    track.style.transition = 'none';
});

wrapper.addEventListener('touchmove', (e) => {
    if (!isDragging) return;

    currentX = e.touches[0].clientX;
    translateX = currentX - startX;

    track.style.transform = `translateX(${translateX}px)`;
});

wrapper.addEventListener('touchend', () => {
    isDragging = false;
    track.style.transition = 'transform 0.3s ease';
});
</script>
