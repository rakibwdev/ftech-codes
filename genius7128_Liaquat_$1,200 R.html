<style>
    .mob-men, .dex_header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    transition: transform 0.3s ease;
}
</style>

<script>

    let lastScrollTop = 0;

const header = document.querySelector('.dex_header');
const mobHeader = document.querySelector('.mob-men');

window.addEventListener('scroll', function () {

    let scrollTop = window.pageYOffset || document.documentElement.scrollTop;

    if (scrollTop > lastScrollTop) {

        if(header){
            header.style.transform = "translateY(-100%)";
            headerstyle.backgroundColor = "#00000070";

        }

        if(mobHeader){
            mobHeader.style.transform = "translateY(-100%)";
            mobHeader.style.backgroundColor = "#00000070";


        }

    } else {

        if(header){
            header.style.transform = "translateY(0)";
            header.style.backgroundColor = "#00000070";
        }

        if(mobHeader){
            mobHeader.style.transform = "translateY(0)";
            mobHeader.style.backgroundColor = "#00000070";
        }

    }

    lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;

});
</script>

<style>

/* hide all by default */
.tec_spec .spec_Des {
    opacity: 0 !important;
    position: absolute !important;
    visibility: hidden !important;
    transition: opacity 0.6s ease, visibility 0.6s linear 0.6s;
}

/* show active only */
.tec_spec .spec_Des.active {

    opacity: 1 !important;
    visibility: visible !important;
}

.pop_button{
    overflow:hidden;

}
.main_img img {

    object-fit: cover;
        border-radius: 12px;
}

.tec_spec .main_img {

    top: 0;
    left: 0;

    /*opacity: 0.6;*/

  button.pop_button:hover,
button.pop_button:focus {
    background-color: transparent;

}

.btn_brc {
    position: relative;
    overflow: hidden;
    display: inline-block;
    z-index: 1;

}

/* pseudo background */
.btn_brc::after {
    content: "";

    bottom: 0;

    height: 0%;
    background-color: black;

}

.btn_spec {
    position: relative;
    overflow: hidden;
    display: inline-block;
    z-index: 1;
    transition: color 0.3s ease;
}

/* pseudo background */
.btn_spec::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: 0;
    width: 100%;
    height: 0%;
    background-color: #CF201A;
    z-index: -1;
    transition: height 0.4s ease;
}

/* hover effect */
.btn_spec:hover::after {
    height: 100%;
}


</style>



<script>
document.addEventListener("DOMContentLoaded", function(){

    document.querySelectorAll('.tec_spec').forEach(container => {

        const sideImgs = container.querySelectorAll('.side_img');
        const mainImgs = container.querySelectorAll('.main_img');
        const specDes  = container.querySelectorAll('.spec_Des');
        const nextBtn = container.querySelector('#next');
        const prevBtn = container.querySelector('#prev');



        let currentIndex = 0;

        function setActive(index){

            // fix index bounds
            if(index < 0) index = sideImgs.length - 1;
            if(index >= sideImgs.length) index = 0;

            currentIndex = index;

            // remove all active
            sideImgs.forEach(el => el.classList.remove('active'));
            mainImgs.forEach(el => el.classList.remove('active'));
            specDes.forEach(el => el.classList.remove('active'));

            // add active
            sideImgs[index]?.classList.add('active');
            mainImgs[index]?.classList.add('active');
            specDes[index]?.classList.add('active');
        }

        // default
        setActive(0);

        // thumbnails click
        sideImgs.forEach(function(img, index){
            img.addEventListener('click', function(){
                setActive(index);
            });
        });

        // buttons click
        if(nextBtn){
            nextBtn.addEventListener('click', function(){
                setActive(currentIndex + 1);
            });
        }

        if(prevBtn){
            prevBtn.addEventListener('click', function(){
                setActive(currentIndex - 1);
            });
        }

    });

});
</script>



<!-- Feature 2: custom mouse pointer with slider -->
 
<style>
  .bg_img{
    object-fit: cover;
    position: absolute;
    transform: translateX(0) scale(1.2);
    transition: transform 0.1s ease ;
    will-change: transform;
}

.card_wrapper {
    overflow: hidden;
    cursor: grab;
    user-select: none;
}

.card_wrapper:active {
    cursor: grabbing;
}

.card_track {
    will-change: transform;
}

.card {
    aspect-ratio: 517/7444 ;
    max-width: 517px;
    max-height: 744px;
    overflow: hidden;
    flex-shrink: 0;
}


/* cursor circle */
.custom_cursor {
    position: fixed;
    top: -37px;
    left: -37px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #fff;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: transform 0s ease, background 0.3s ease;
    opacity: 0;
}

.custom_cursor .arrow {
    font-size: 14px;
    color: #000000;
}

</style>


<script>
document.addEventListener("DOMContentLoaded", () => {
const wrapper = document.querySelector('.card_wrapper');
const track = document.querySelector('.card_track');
const bgImages = document.querySelectorAll('.bg_img');
const cursor = document.querySelector('.custom_cursor');
const cardWidth = document.querySelector('.card').offsetWidth;


let isDragging = false;
let startX = 0;
let targetX = 0;    
let translateX = 0; 
let mouseX = 0;
let mouseY = 0;
let lastX = 0;
let scale = 1;
let posX = 0, posY = 0;
let targetScale = 1;


// Desktop mouse events

wrapper.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.pageX - targetX;
    wrapper.style.cursor = 'grabbing';
    targetScale = 0.5;
});

wrapper.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;

    lastX = mouseX;

    if (!isDragging) return;

    targetX = e.pageX - startX;
});
wrapper.addEventListener('mouseup', (e) => {
    stopDrag();
    targetScale = 1;
});

wrapper.addEventListener('mouseenter', () => {
    cursor.style.opacity = '1';
});

wrapper.addEventListener('mouseleave',() => {
    cursor.style.opacity = '0';
    stopDrag();
});

function stopDrag() {
    isDragging = false;
    wrapper.style.cursor = 'grab';
}


// mobile touch events

wrapper.addEventListener('touchstart', (e) => {
    isDragging = true;
    startX = e.touches[0].clientX - targetX;
});

wrapper.addEventListener('touchmove', (e) => {
    if (!isDragging) return;

    targetX = e.touches[0].clientX - startX;
});

wrapper.addEventListener('touchend', () => {
    isDragging = false;
});


// animation

function animate() {

    translateX += (targetX - translateX) * 0.1;
    posX += (mouseX - posX) * 0.15;
    posY += (mouseY - posY) * 0.15;
    scale += (targetScale - scale) * 0.1;

    const max = 0;
    const min = wrapper.offsetWidth - track.scrollWidth;

    if (translateX > max) translateX = max;
    if (translateX < min) translateX = min;

    track.style.transform = `translateX(${translateX}px)`;

    bgImages.forEach((bg) => {
        const ratio = translateX / cardWidth;

        // limit movement
        const move = ratio * 50; // 50px max movement

        bg.style.transform = `translateX(${move}px) scale(1.2)`;
    });

    cursor.style.transform = `
    translate(${posX}px, ${posY}px)
    scale(${scale})
    `;

    requestAnimationFrame(animate);
}

animate();
});

</script>
