<script>
document.querySelectorAll(".btn_click").forEach(btn => {
    btn.addEventListener("click", function () {
        this.nextElementSibling.classList.toggle("active");

           const icon = this.querySelector(".chev_icon");
        if (icon) {
            icon.classList.toggle("active");
        }

    });
});
</script>


<script>
document.querySelectorAll(".btn_bg").forEach(btn => {
    btn.addEventListener("click", function () {

        // remove active from all
        document.querySelectorAll(".btn_bg").forEach(b => b.classList.remove("active"));

        // add to current
        this.classList.add("active");

    });
});
</script>


<style>


.btn_bg {
    background-color: #eee;
    transition: background-color 0.3s ease;
}

.btn_bg.active {
    background-color: #005EFF; /* your active color */
    color: #fff; /* optional */
}

</style>
